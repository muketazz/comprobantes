<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comprobante de Pago</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 16px;
    }

    /* ── BOTÓN DESCARGA ── */
    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #25577d;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 11px 28px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 24px;
      letter-spacing: 0.03em;
      transition: background 0.2s;
    }
    .btn-download:hover    { background: #1a3f5c; }
    .btn-download:disabled { background: #888; cursor: default; }

    /* ── COMPROBANTE ── */
    #comprobante {
      background: #fff;
      width: 100%;
      max-width: 600px;
      border: 1px solid #d0d0d0;
    }

    /* ── HEADER ── */
    .header {
      background: #25577d;
      padding: 24px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      width: 200px;
      height: 80px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .header-right     { text-align: right; }
    .company-name     { font-size: 20px; font-weight: bold; color: #fff; letter-spacing: 0.02em; }
    .company-sub      { font-size: 12px; color: rgba(255,255,255,0.70); margin-top: 4px; }

    /* ── FRANJA SECUNDARIA ── */
    .subheader {
      background: #1a3f5c;
      padding: 8px 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .subheader span   { font-size: 11px; color: rgba(255,255,255,0.60); letter-spacing: 0.08em; text-transform: uppercase; }
    .subheader strong { font-size: 11px; color: #fff; letter-spacing: 0.04em; }

    /* ── CUERPO ── */
    .body { padding: 32px 36px 28px; }

    .section-title {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #25577d;
      border-bottom: 2px solid #25577d;
      padding-bottom: 6px;
      margin-bottom: 18px;
    }

    /* Tabla de datos */
    .data-table               { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
    .data-table tr            { border-bottom: 1px solid #ebebeb; }
    .data-table tr:last-child { border-bottom: none; }
    .data-table td            { padding: 11px 0; font-size: 14px; }
    .data-table td.label      { color: #888; width: 40%; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
    .data-table td.value      { color: #1a1a1a; font-weight: bold; }
    .data-table td.value.missing { color: #bbb; font-weight: normal; font-style: italic; }

    /* Caja de importe */
    .importe-row       { display: flex; align-items: stretch; border: 1px solid #d0d0d0; }
    .importe-label-box {
      background: #25577d;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      min-width: 140px;
    }
    .importe-value-box {
      flex: 1;
      padding: 14px 20px;
      font-size: 24px;
      font-weight: bold;
      color: #25577d;
      display: flex;
      align-items: center;
      background: #f4f8fb;
    }

    /* Sello */
    .stamp-row { display: flex; justify-content: flex-end; margin-top: 24px; }
    .stamp {
      border: 2px solid #2e9e5b;
      color: #2e9e5b;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 6px 18px;
      transform: rotate(-2deg);
      display: inline-block;
    }

    /* ── PIE ── */
    .footer {
      background: #f7f7f7;
      border-top: 1px solid #e0e0e0;
      padding: 12px 36px;
      font-size: 10px;
      color: #aaa;
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* ── AVISO PARÁMETROS FALTANTES ── */
    #aviso-params {
      max-width: 600px;
      width: 100%;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 4px;
      padding: 12px 18px;
      font-size: 12px;
      color: #795548;
      margin-bottom: 16px;
      display: none;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .header            { padding: 20px; flex-direction: column; align-items: flex-start; }
      .header-right      { text-align: left; }
      .subheader         { padding: 8px 20px; }
      .body              { padding: 24px 20px; }
      .importe-label-box { min-width: 110px; font-size: 10px; padding: 12px 14px; }
      .importe-value-box { font-size: 20px; padding: 12px 14px; }
      .footer            { padding: 12px 20px; }
    }
  </style>
</head>
<body>

  <!-- Botón de descarga (no se incluye en el PDF) -->
  <button class="btn-download" onclick="descargarPDF()">
    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Descargar PDF
  </button>

  <!-- ── COMPROBANTE (se convierte en PDF) ── -->
  <div id="comprobante">

    <!-- Encabezado: logo izquierda / empresa derecha -->
    <div class="header">
      <div class="logo">
      </div>
      <div class="header-right">
        <div class="company-name">Andres Arriaga SRL</div>
        <div class="company-sub">CUIT: 30-71516463-5</div>
      </div>
    </div>

    <!-- Franja secundaria -->
    <div class="subheader">
      <span>Comprobante de Pago</span>
      <strong id="subheader-fecha">—</strong>
    </div>

    <!-- Cuerpo -->
    <div class="body">

      <div class="section-title">Detalle del Pago</div>

      <table class="data-table">
        <tr>
          <td class="label">Fecha de pago</td>
          <td class="value" id="campo-fecha">—</td>
        </tr>
        <tr>
          <td class="label">Proveedor</td>
          <td class="value" id="campo-proveedor">—</td>
        </tr>
        <tr>
          <td class="label">Forma de pago</td>
          <td class="value" id="campo-forma">—</td>
        </tr>
      </table>

      <!-- Importe total -->
      <div class="importe-row">
        <div class="importe-label-box">Total Pagado</div>
        <div class="importe-value-box" id="campo-importe">$ —</div>
      </div>

      <div class="stamp-row"></div>

    </div>

    <!-- Pie -->
    <div class="footer">
      Este comprobante es válido como constancia de pago
    </div>

  </div>


  <script>
    // 1. Leer parámetro de la URL
    function obtenerParam(nombre) {
      const params = new URLSearchParams(window.location.search);
      const valor  = params.get(nombre);
      return (valor !== null && valor.trim() !== '') ? valor.trim() : null;
    }

    // 2. Convertir "YYYY-MM-DD" → "DD/MM/YYYY"
    function formatearFecha(str) {
      if (!str) return null;
      if (str.includes('-')) {
        const [a, m, d] = str.split('-');
        return `${d}/${m}/${a}`;
      }
      return str;
    }

    // 3. Formatear número como moneda ARS
    function formatearImporte(str) {
      if (!str) return null;
      const n = parseFloat(str.replace(',', '.'));
      if (isNaN(n)) return str;
      return n.toLocaleString('es-AR', {
        style: 'currency', currency: 'ARS',
        minimumFractionDigits: 2, maximumFractionDigits: 2
      });
    }

    // 4. Llenar el comprobante con los datos de la URL
    function completarComprobante() {
      const fecha     = obtenerParam('fecha');
      const proveedor = obtenerParam('proveedor');
      const forma     = obtenerParam('forma');
      const importe   = obtenerParam('importe');

      let hayFaltantes = false;

      function escribir(id, valor) {
        const el = document.getElementById(id);
        if (valor) {
          el.textContent = valor;
          el.classList.remove('missing');
        } else {
          el.textContent = 'No especificado';
          el.classList.add('missing');
          hayFaltantes = true;
        }
      }

      escribir('campo-fecha',     formatearFecha(fecha));
      escribir('campo-proveedor', proveedor);
      escribir('campo-forma',     forma);

      const impFormatado = formatearImporte(importe);
      const elImp = document.getElementById('campo-importe');
      if (impFormatado) {
        elImp.textContent    = impFormatado;
        elImp.style.color    = '#25577d';
        elImp.style.fontSize = '24px';
      } else {
        elImp.textContent    = 'No especificado';
        elImp.style.color    = '#bbb';
        elImp.style.fontSize = '16px';
        hayFaltantes = true;
      }

      document.getElementById('subheader-fecha').textContent = formatearFecha(fecha) || '—';

      if (hayFaltantes) {
        document.getElementById('aviso-params').style.display = 'block';
      }
    }

    // 5. Generar y descargar el PDF — con comprobante centrado en la hoja
    function descargarPDF() {
      const btn = document.querySelector('.btn-download');
      btn.disabled    = true;
      btn.textContent = 'Generando PDF…';

      // Creamos un wrapper del ancho de A4 a 96dpi (794px)
      // con el comprobante centrado dentro usando flexbox
      const wrapper = document.createElement('div');
      wrapper.style.cssText = [
        'width: 794px',
        'min-height: 100px',
        'background: #ffffff',
        'display: flex',
        'justify-content: center',
        'align-items: flex-start',
        'padding: 40px 0',
        'font-family: Arial, Helvetica, sans-serif',
      ].join('; ');

      // Clonamos el comprobante dentro del wrapper
      const clone = document.getElementById('comprobante').cloneNode(true);
      // Fijamos un ancho exacto para que no se estire al 100% del wrapper
      clone.style.width    = '600px';
      clone.style.maxWidth = '600px';
      clone.style.flex     = 'none';
      wrapper.appendChild(clone);

      // Lo agregamos al DOM (oculto visualmente)
      wrapper.style.position = 'absolute';
      wrapper.style.left     = '-9999px';
      wrapper.style.top      = '0';
      document.body.appendChild(wrapper);

      html2pdf()
        .set({
          margin:      0,
          filename:    'comprobante-pago.pdf',
          image:       { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', width: 794 },
          jsPDF:       { unit: 'px', format: [794, 1123], orientation: 'portrait' },
          pagebreak:   { mode: 'avoid-all' }
        })
        .from(wrapper)
        .save()
        .then(() => {
          document.body.removeChild(wrapper);
          btn.disabled = false;
          btn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Descargar PDF`;
        });
    }

    document.addEventListener('DOMContentLoaded', completarComprobante);
  </script>

</body>
</html>
